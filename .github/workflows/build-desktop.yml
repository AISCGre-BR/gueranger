name: Build Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build desktop for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }}
        working-directory: packages/desktop

      - name: Verify bundle has no external npm deps
        shell: bash
        run: |
          MAIN_SIZE=$(wc -c < packages/desktop/out/main/index.js)
          echo "Main bundle size: $MAIN_SIZE bytes"
          if [ "$MAIN_SIZE" -lt 100000 ]; then
            echo "ERROR: Main bundle too small ($MAIN_SIZE bytes) — deps not bundled!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gueranger-${{ matrix.platform }}
          path: |
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.exe
          retention-days: 30

      - name: Attach installers to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          files: |
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.exe
