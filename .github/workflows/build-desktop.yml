name: Build Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build desktop for ${{ matrix.platform }}
        run: npm run dist:${{ matrix.platform }}
        working-directory: packages/desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gueranger-${{ matrix.platform }}
          path: |
            packages/desktop/dist/*.AppImage
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.exe
          retention-days: 30
