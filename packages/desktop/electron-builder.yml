appId: com.gueranger.app
productName: Gueranger
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
icon: resources/icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.education
  icon: resources/icon.png
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Education
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
